<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Monitoreo Ambiental</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

<style>

:root{
--bg:#f2f4f8;
--card:#ffffff;
--text:#2c3e50;
--header:#1b3a57;
--border:#e6ecf2;
--rowHighlight:rgba(27,58,87,0.08);
--rowActive:rgba(27,58,87,0.14);
--rowNewest:rgba(46,204,113,0.18);
}

body.dark{
--bg:#121417;
--card:#1c1f24;
--text:#e4e6eb;
--header:#0f253a;
--border:#2a2f36;
--rowHighlight:rgba(255,255,255,0.06);
--rowActive:rgba(255,255,255,0.12);
--rowNewest:rgba(46,204,113,0.22);
}

body{
margin:0;
font-family:"Segoe UI",Roboto,Arial,sans-serif;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

header{
background:var(--header);
color:white;
padding:25px;
text-align:center;
}

header h1{
margin:0;
font-size:24px;
}

.darkToggle{
position:fixed;
top:15px;
right:15px;
border:none;
border-radius:20px;
padding:8px 14px;
cursor:pointer;
font-size:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:999;
background:white;
}

body.dark .darkToggle{
background:#2a2f36;
color:white;
}

.contenedor{
max-width:1200px;
margin:40px auto;
padding:20px;
display:flex;
flex-direction:column;
gap:40px;
}

.card{
background:var(--card);
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
padding:25px;
}

.card h2{
margin-top:0;
font-size:18px;
border-bottom:2px solid var(--border);
padding-bottom:10px;
margin-bottom:20px;
color:var(--header);
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:var(--header);
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid var(--border);
text-align:center;
}

tbody tr{
transition:background 0.18s ease;
}

tbody tr:hover{
background:var(--rowHighlight);
}

tbody tr:active{
background:var(--rowActive);
}

tbody tr.nueva{
background:var(--rowNewest);
}

.grid-graficos{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

canvas{
width:100%!important;
height:320px!important;
}

footer{
text-align:center;
padding:20px;
font-size:13px;
color:#7f8c8d;
}

@media(max-width:1000px){

.grid-graficos{
grid-template-columns:repeat(2,1fr);
}

canvas{
height:300px!important;
}

}

@media(max-width:650px){

.grid-graficos{
grid-template-columns:1fr;
}

canvas{
height:260px!important;
}

header h1{
font-size:20px;
}

}

</style>
</head>

<body>

<button class="darkToggle" onclick="toggleDark()">🌙 / ☀</button>

<header>
<h1>Sistema de Monitoreo Ambiental en Tiempo Real</h1>
</header>

<div class="contenedor">

<div class="card">
<h2>Registro Histórico Reciente</h2>
<table>
<thead>
<tr>
<th>Fecha y Hora</th>
<th>Temperatura (°C)</th>
<th>Humedad (%)</th>
<th>Presión (hPa)</th>
</tr>
</thead>
<tbody id="tablaBody"></tbody>
</table>
</div>

<div class="card">
<h2>Visualización General</h2>
<canvas id="graficoGeneral"></canvas>
</div>

<div class="grid-graficos">

<div class="card">
<h2>Temperatura</h2>
<canvas id="graficoTemp"></canvas>
</div>

<div class="card">
<h2>Humedad</h2>
<canvas id="graficoHum"></canvas>
</div>

<div class="card">
<h2>Presión</h2>
<canvas id="graficoPres"></canvas>
</div>

</div>
</div>

<footer>
Proyecto de Monitoreo Ambiental — Prototipo Institucional
</footer>

<script>

const URL="https://script.google.com/macros/s/AKfycbzRFCU9xvuNrxeL6GIg06jKVhpBFrddmZ86M-T9jXEabJNdHazOXlA-a9FExJ3CABCF5A/exec";

let graficoGeneral,graficoTemp,graficoHum,graficoPres;
let ultimoTimestamp=null;

const MAX_POINTS=120;
const MAX_ROWS=10;

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("modoOscuro",document.body.classList.contains("dark"));
}

if(localStorage.getItem("modoOscuro")==="true"){
document.body.classList.add("dark");
}

function formatearHora(ts){
const d=new Date(ts);
return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function agregarFila(fecha,v1,v2,v3){

const tbody=document.getElementById("tablaBody");

tbody.querySelectorAll("tr").forEach(f=>f.classList.remove("nueva"));

const tr=document.createElement("tr");
tr.classList.add("nueva");

tr.innerHTML=`
<td>${fecha}</td>
<td>${v1}</td>
<td>${v2}</td>
<td>${v3}</td>
`;

tbody.insertBefore(tr,tbody.firstChild);

while(tbody.rows.length>MAX_ROWS){
tbody.deleteRow(tbody.rows.length-1);
}

}

async function cargarInicial(){

const res=await fetch(URL);
const data=await res.json();

const labels=[];
const temp=[];
const hum=[];
const pres=[];

data.forEach(d=>{

const fechaCompleta=new Date(d.timestamp).toLocaleString();
const hora=formatearHora(d.timestamp);

labels.push(hora);
temp.push(d.v1);
hum.push(d.v2);
pres.push(d.v3);

agregarFila(fechaCompleta,d.v1,d.v2,d.v3);

});

ultimoTimestamp=data[data.length-1].timestamp;

graficoGeneral=crearGrafico("graficoGeneral",labels,[
{label:'Temperatura (°C)',data:temp,borderColor:"#e74c3c"},
{label:'Humedad (%)',data:hum,borderColor:"#3498db"},
{label:'Presión (hPa)',data:pres,borderColor:"#2ecc71"}
]);

graficoTemp=crearGrafico("graficoTemp",labels,[
{label:'Temperatura (°C)',data:temp,borderColor:"#e74c3c"}
]);

graficoHum=crearGrafico("graficoHum",labels,[
{label:'Humedad (%)',data:hum,borderColor:"#3498db"}
]);

graficoPres=crearGrafico("graficoPres",labels,[
{label:'Presión (hPa)',data:pres,borderColor:"#2ecc71"}
]);

}

function crearGrafico(id,labels,datasets){

return new Chart(document.getElementById(id),{

type:'line',

data:{
labels,
datasets:datasets.map(ds=>({
...ds,
tension:0.35,
borderWidth:2,
pointRadius:2,
fill:false
}))
},

options:{
responsive:true,
maintainAspectRatio:false,

interaction:{
mode:'index',
intersect:false
},

plugins:{
legend:{position:'top'},
zoom:{
pan:{enabled:true,mode:'x'},
zoom:{
wheel:{enabled:true},
pinch:{enabled:true},
mode:'x'
}
}
},

scales:{
x:{
ticks:{
maxRotation:0,
autoSkip:true,
maxTicksLimit:8
}
}
}

}

});

}

function limitarDatos(g){
if(g.data.labels.length>MAX_POINTS){
g.data.labels.shift();
g.data.datasets.forEach(d=>d.data.shift());
}
}

async function verificarNuevoDato(){

const res=await fetch(URL+"?last=true");
const nuevo=await res.json();

if(!nuevo.timestamp||nuevo.timestamp===ultimoTimestamp)return;

ultimoTimestamp=nuevo.timestamp;

const hora=formatearHora(nuevo.timestamp);
const fechaCompleta=new Date(nuevo.timestamp).toLocaleString();

[graficoGeneral,graficoTemp,graficoHum,graficoPres].forEach(g=>{
g.data.labels.push(hora);
});

graficoGeneral.data.datasets[0].data.push(nuevo.v1);
graficoGeneral.data.datasets[1].data.push(nuevo.v2);
graficoGeneral.data.datasets[2].data.push(nuevo.v3);

graficoTemp.data.datasets[0].data.push(nuevo.v1);
graficoHum.data.datasets[0].data.push(nuevo.v2);
graficoPres.data.datasets[0].data.push(nuevo.v3);

[graficoGeneral,graficoTemp,graficoHum,graficoPres].forEach(g=>{
limitarDatos(g);
g.update();
});

agregarFila(fechaCompleta,nuevo.v1,nuevo.v2,nuevo.v3);

}

cargarInicial();
setInterval(verificarNuevoDato,1000);

</script>

</body>
</html>
