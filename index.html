<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitoreo Ambiental</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f9;
    text-align:center;
}

header{
    background:#1f3a5f;
    color:white;
    padding:20px;
    font-size:24px;
}

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
}

.card{
    background:white;
    margin-top:25px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.chart-container{
    position:relative;
    height:300px;
    width:100%;
}

.small-charts{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:8px;
    border-bottom:1px solid #ddd;
    font-size:14px;
}

th{
    background:#1f3a5f;
    color:white;
}

@media(max-width:600px){

header{
    font-size:18px;
}

}

</style>
</head>

<body>

<header>
Sistema de Monitoreo Ambiental
</header>

<div class="container">

<div class="card">

<h2>Visualización General</h2>

<div class="chart-container">
<canvas id="graficoGeneral"></canvas>
</div>

</div>


<div class="card">

<h2>Variables Individuales</h2>

<div class="small-charts">

<div class="chart-container">
<canvas id="graficoTemp"></canvas>
</div>

<div class="chart-container">
<canvas id="graficoHum"></canvas>
</div>

<div class="chart-container">
<canvas id="graficoPres"></canvas>
</div>

</div>

</div>


<div class="card">

<h2>Últimos Registros</h2>

<table id="tabla">

<thead>
<tr>
<th>Hora</th>
<th>Temperatura</th>
<th>Humedad</th>
<th>Presión</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>


<script>

const URL = "https://script.google.com/macros/s/AKfycbzRFCU9xvuNrxeL6GIg06jKVhpBFrddmZ86M-T9jXEabJNdHazOXlA-a9FExJ3CABCF5A/exec";

let graficoGeneral;
let graficoTemp;
let graficoHum;
let graficoPres;

let ultimoTimestamp=null;

function horaCorta(ts){

const d = new Date(ts);

return d.toLocaleTimeString();

}

function crearGrafico(id,label,color){

return new Chart(document.getElementById(id),{

type:'line',

data:{
labels:[],
datasets:[{
label:label,
data:[],
borderColor:color,
backgroundColor:color,
tension:0.4,
pointRadius:2,
fill:false
}]
},

options:{
responsive:true,
maintainAspectRatio:false,
animation:{
duration:700
},
plugins:{
legend:{
display:true
}
},
scales:{
x:{
ticks:{
maxRotation:0,
autoSkip:true,
maxTicksLimit:8
}
}
}
}

});

}


function crearGraficoGeneral(){

return new Chart(document.getElementById("graficoGeneral"),{

type:'line',

data:{
labels:[],
datasets:[
{
label:"Temperatura",
data:[],
borderColor:"red",
tension:0.4,
pointRadius:2
},
{
label:"Humedad",
data:[],
borderColor:"blue",
tension:0.4,
pointRadius:2
},
{
label:"Presión",
data:[],
borderColor:"green",
tension:0.4,
pointRadius:2
}
]
},

options:{
responsive:true,
maintainAspectRatio:false,
animation:{
duration:700
},
scales:{
x:{
ticks:{
maxRotation:0,
autoSkip:true,
maxTicksLimit:10
}
}
}
}

});

}


function agregarFilaTabla(d){

const tbody=document.querySelector("#tabla tbody");

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${horaCorta(d.timestamp)}</td>
<td>${d.v1}</td>
<td>${d.v2}</td>
<td>${d.v3}</td>
`;

tbody.prepend(tr);

while(tbody.rows.length>20){
tbody.deleteRow(20);
}

}


async function cargarInicial(){

const res = await fetch(URL);

const data = await res.json();


graficoGeneral = crearGraficoGeneral();

graficoTemp = crearGrafico("graficoTemp","Temperatura","red");

graficoHum = crearGrafico("graficoHum","Humedad","blue");

graficoPres = crearGrafico("graficoPres","Presión","green");


data.forEach(d=>{

const hora = horaCorta(d.timestamp);

graficoGeneral.data.labels.push(hora);

graficoGeneral.data.datasets[0].data.push(d.v1);
graficoGeneral.data.datasets[1].data.push(d.v2);
graficoGeneral.data.datasets[2].data.push(d.v3);

graficoTemp.data.labels.push(hora);
graficoTemp.data.datasets[0].data.push(d.v1);

graficoHum.data.labels.push(hora);
graficoHum.data.datasets[0].data.push(d.v2);

graficoPres.data.labels.push(hora);
graficoPres.data.datasets[0].data.push(d.v3);

agregarFilaTabla(d);

});


graficoGeneral.update();
graficoTemp.update();
graficoHum.update();
graficoPres.update();


ultimoTimestamp = data[data.length-1].timestamp;

}


async function verificarNuevoDato(){

const res = await fetch(URL+"?last=true");

const d = await res.json();

if(d.timestamp!=ultimoTimestamp){

ultimoTimestamp = d.timestamp;

const hora = horaCorta(d.timestamp);

graficoGeneral.data.labels.push(hora);
graficoGeneral.data.datasets[0].data.push(d.v1);
graficoGeneral.data.datasets[1].data.push(d.v2);
graficoGeneral.data.datasets[2].data.push(d.v3);

graficoTemp.data.labels.push(hora);
graficoTemp.data.datasets[0].data.push(d.v1);

graficoHum.data.labels.push(hora);
graficoHum.data.datasets[0].data.push(d.v2);

graficoPres.data.labels.push(hora);
graficoPres.data.datasets[0].data.push(d.v3);

graficoGeneral.update();
graficoTemp.update();
graficoHum.update();
graficoPres.update();

agregarFilaTabla(d);

}

}

cargarInicial();

setInterval(verificarNuevoDato,3000);

</script>

</body>
</html>
