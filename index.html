<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitoreo Ambiental</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

:root{
--bg:#f5f6fa;
--card:#ffffff;
--text:#222;
--accent:#2f80ed;
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--accent:#38bdf8;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
margin-bottom:25px;
}

h1{
margin-top:0;
text-align:center;
}

.status{
text-align:center;
margin-bottom:15px;
font-weight:bold;
color:#22c55e;
}

.grid3{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

@media(max-width:900px){
.grid3{
grid-template-columns:1fr;
}
}

canvas{
max-height:320px !important;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
font-size:14px;
}

.switch{
position:fixed;
top:15px;
right:20px;
background:var(--card);
padding:8px 14px;
border-radius:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
cursor:pointer;
font-size:14px;
}

</style>
</head>

<body>

<div class="switch" onclick="toggleMode()">🌙 / ☀</div>

<div class="container">

<h1>Monitoreo Ambiental</h1>

<div class="status">Sistema activo</div>

<div class="card">
<canvas id="graficoGeneral"></canvas>
</div>

<div class="grid3">

<div class="card">
<canvas id="graficoTemp"></canvas>
</div>

<div class="card">
<canvas id="graficoHum"></canvas>
</div>

<div class="card">
<canvas id="graficoGas"></canvas>
</div>

</div>

<div class="card">

<table id="tablaDatos">

<thead>
<tr>
<th>Fecha</th>
<th>Temperatura</th>
<th>Humedad</th>
<th>Gas</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let datos = {
labels:[],
temp:[],
hum:[],
gas:[]
}

const pluginLineaAnimada = {
id:'lineaAnimada',

beforeDatasetsDraw(chart,args,pluginOptions){

const ctx = chart.ctx

ctx.save()

ctx.setLineDash([6,6])

ctx.lineDashOffset = -Date.now()/50

}

}

Chart.register(pluginLineaAnimada)

function crearGrafico(ctx,label,data,color){

return new Chart(ctx,{
type:'line',
data:{
labels:datos.labels,
datasets:[{
label:label,
data:data,
borderColor:color,
backgroundColor:'transparent',
tension:0.4,
borderWidth:2,
pointRadius:2
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
animation:{
duration:800
},
plugins:{
legend:{display:true}
},
scales:{
x:{
ticks:{
maxTicksLimit:6
}
}
}
}
})

}

const graficoGeneral = new Chart(
document.getElementById('graficoGeneral'),
{
type:'line',
data:{
labels:datos.labels,
datasets:[
{
label:'Temperatura',
data:datos.temp,
borderColor:'#ef4444',
tension:0.4
},
{
label:'Humedad',
data:datos.hum,
borderColor:'#3b82f6',
tension:0.4
},
{
label:'Gas',
data:datos.gas,
borderColor:'#22c55e',
tension:0.4
}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
animation:{duration:800},
scales:{
x:{ticks:{maxTicksLimit:6}}
}
}
}
)

const graficoTemp = crearGrafico(
document.getElementById('graficoTemp'),
'Temperatura',
datos.temp,
'#ef4444'
)

const graficoHum = crearGrafico(
document.getElementById('graficoHum'),
'Humedad',
datos.hum,
'#3b82f6'
)

const graficoGas = crearGrafico(
document.getElementById('graficoGas'),
'Gas',
datos.gas,
'#22c55e'
)

function actualizarTabla(){

const tbody=document.querySelector("#tablaDatos tbody")

tbody.innerHTML=""

for(let i=datos.labels.length-1;i>=0;i--){

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${datos.labels[i]}</td>
<td>${datos.temp[i]}</td>
<td>${datos.hum[i]}</td>
<td>${datos.gas[i]}</td>
`

tbody.appendChild(tr)

}

}

function agregarDato(){

const ahora=new Date()

const hora=
ahora.getHours()+":"+
ahora.getMinutes()+":"+
ahora.getSeconds()

datos.labels.push(hora)

datos.temp.push((20+Math.random()*5).toFixed(1))
datos.hum.push((50+Math.random()*10).toFixed(1))
datos.gas.push((300+Math.random()*50).toFixed(0))

if(datos.labels.length>20){

datos.labels.shift()
datos.temp.shift()
datos.hum.shift()
datos.gas.shift()

}

graficoGeneral.update()
graficoTemp.update()
graficoHum.update()
graficoGas.update()

actualizarTabla()

}

setInterval(agregarDato,3000)

function toggleMode(){

document.body.classList.toggle("dark")

}

</script>

</body>
</html>
