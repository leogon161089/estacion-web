<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitoreo Ambiental</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* VARIABLES DE TEMA */

:root{
--bg:#f4f6f9;
--card:#ffffff;
--text:#222;
--header:#1f3a5f;
--table-border:#ddd;
}

body.dark{
--bg:#0f1720;
--card:#1b2430;
--text:#e6edf3;
--header:#0a2540;
--table-border:#2a3442;
}

/* BASE */

body{
font-family:Arial;
margin:0;
background:var(--bg);
color:var(--text);
text-align:center;
transition:background .3s,color .3s;
}

header{
background:var(--header);
color:white;
padding:20px;
position:relative;
}

/* HEADER */

.header-content{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1400px;
margin:auto;
font-size:22px;
}

/* SWITCH */

.theme-switch{
position:absolute;
top:15px;
right:20px;
display:flex;
align-items:center;
gap:8px;
font-size:13px;
cursor:pointer;
}

.switch{
width:42px;
height:22px;
background:#888;
border-radius:20px;
position:relative;
transition:.3s;
}

.switch::after{
content:"";
width:18px;
height:18px;
background:white;
border-radius:50%;
position:absolute;
top:2px;
left:2px;
transition:.3s;
}

body.dark .switch{
background:#4cafef;
}

body.dark .switch::after{
left:22px;
}

/* STATUS */

.status{
display:flex;
align-items:center;
gap:8px;
font-size:14px;
}

.pulse{
width:10px;
height:10px;
background:#2ecc71;
border-radius:50%;
position:relative;
}

.pulse::after{
content:"";
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:#2ecc71;
left:0;
top:0;
animation:pulseAnim 1.8s infinite;
opacity:0.6;
}

@keyframes pulseAnim{

0%{transform:scale(1);opacity:0.6;}
70%{transform:scale(3);opacity:0;}
100%{transform:scale(1);opacity:0;}

}

/* LAYOUT */

.container{
width:95%;
max-width:1400px;
margin:auto;
}

.card{
background:var(--card);
margin-top:25px;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
transition:.3s;
}

.chart-container{
position:relative;
height:300px;
width:100%;
overflow:hidden;
}

.small-charts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* RADAR SWEEP */

.radar-sweep{
position:absolute;
top:0;
left:-40%;
width:40%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);
animation:sweep 4s linear infinite;
pointer-events:none;
}

@keyframes sweep{
0%{left:-40%;}
100%{left:140%;}
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid var(--table-border);
font-size:14px;
}

th{
background:var(--header);
color:white;
}

/* MOBILE */

@media(max-width:600px){

.header-content{
flex-direction:column;
gap:10px;
font-size:18px;
}

}

</style>
</head>

<body>

<header>

<div class="theme-switch" onclick="toggleTheme()">
<span>🌙</span>
<div class="switch"></div>
</div>

<div class="header-content">

<span>Sistema de Monitoreo Ambiental</span>

<div class="status">
<span class="pulse"></span>
<span>Sistema activo</span>
</div>

</div>

</header>


<div class="container">

<div class="card">

<h2>Visualización General</h2>

<div class="chart-container">

<canvas id="graficoGeneral"></canvas>

<div class="radar-sweep"></div>

</div>

</div>


<div class="card">

<h2>Variables Individuales</h2>

<div class="small-charts">

<div class="chart-container">
<canvas id="graficoTemp"></canvas>
</div>

<div class="chart-container">
<canvas id="graficoHum"></canvas>
</div>

<div class="chart-container">
<canvas id="graficoPres"></canvas>
</div>

</div>

</div>


<div class="card">

<h2>Últimos Registros</h2>

<table id="tabla">

<thead>
<tr>
<th>Hora</th>
<th>Temperatura</th>
<th>Humedad</th>
<th>Presión</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>


<script>

const URL="https://script.google.com/macros/s/AKfycbzRFCU9xvuNrxeL6GIg06jKVhpBFrddmZ86M-T9jXEabJNdHazOXlA-a9FExJ3CABCF5A/exec";

const MAX_PUNTOS=30;

let graficoGeneral;
let graficoTemp;
let graficoHum;
let graficoPres;

let ultimoTimestamp=null;

/* THEME */

function toggleTheme(){

document.body.classList.toggle("dark");

localStorage.setItem("theme",
document.body.classList.contains("dark")?"dark":"light");

updateCharts();

}

function loadTheme(){

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}

}

function chartTextColor(){

return getComputedStyle(document.body)
.getPropertyValue('--text');

}

function updateCharts(){

[graficoGeneral,graficoTemp,graficoHum,graficoPres].forEach(g=>{

g.options.scales.x.ticks.color=chartTextColor();
g.options.scales.y.ticks.color=chartTextColor();

g.update();

});

}

/* UTIL */

function horaCorta(ts){
return new Date(ts).toLocaleTimeString();
}

function crearGrafico(id,label,color){

return new Chart(document.getElementById(id),{

type:'line',

data:{
labels:[],
datasets:[{
label:label,
data:[],
borderColor:color,
backgroundColor:color,
tension:0.4,
pointRadius:0,
borderWidth:2
}]
},

options:{
responsive:true,
maintainAspectRatio:false,
animation:{duration:400,easing:'linear'},
scales:{
x:{ticks:{color:chartTextColor()}},
y:{ticks:{color:chartTextColor()}}
}
}

});

}

function crearGraficoGeneral(){

return new Chart(document.getElementById("graficoGeneral"),{

type:'line',

data:{
labels:[],
datasets:[
{label:"Temperatura",data:[],borderColor:"red",tension:0.4,pointRadius:0},
{label:"Humedad",data:[],borderColor:"blue",tension:0.4,pointRadius:0},
{label:"Presión",data:[],borderColor:"green",tension:0.4,pointRadius:0}
]
},

options:{
responsive:true,
maintainAspectRatio:false,
animation:{duration:400,easing:'linear'},
scales:{
x:{ticks:{color:chartTextColor()}},
y:{ticks:{color:chartTextColor()}}
}
}

});

}

/* TABLE */

function agregarFilaTabla(d){

const tbody=document.querySelector("#tabla tbody");

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${horaCorta(d.timestamp)}</td>
<td>${d.v1}</td>
<td>${d.v2}</td>
<td>${d.v3}</td>
`;

tbody.prepend(tr);

while(tbody.rows.length>20){
tbody.deleteRow(20);
}

}

/* LOAD */

async function cargarInicial(){

loadTheme();

const res=await fetch(URL);
const data=await res.json();

graficoGeneral=crearGraficoGeneral();
graficoTemp=crearGrafico("graficoTemp","Temperatura","red");
graficoHum=crearGrafico("graficoHum","Humedad","blue");
graficoPres=crearGrafico("graficoPres","Presión","green");

data.forEach(d=>{

const hora=horaCorta(d.timestamp);

graficoGeneral.data.labels.push(hora);

graficoGeneral.data.datasets[0].data.push(d.v1);
graficoGeneral.data.datasets[1].data.push(d.v2);
graficoGeneral.data.datasets[2].data.push(d.v3);

graficoTemp.data.labels.push(hora);
graficoTemp.data.datasets[0].data.push(d.v1);

graficoHum.data.labels.push(hora);
graficoHum.data.datasets[0].data.push(d.v2);

graficoPres.data.labels.push(hora);
graficoPres.data.datasets[0].data.push(d.v3);

agregarFilaTabla(d);

});

graficoGeneral.update();
graficoTemp.update();
graficoHum.update();
graficoPres.update();

ultimoTimestamp=data[data.length-1].timestamp;

}

/* UPDATE */

async function verificarNuevoDato(){

const res=await fetch(URL+"?last=true");
const d=await res.json();

if(d.timestamp!=ultimoTimestamp){

ultimoTimestamp=d.timestamp;

const hora=horaCorta(d.timestamp);

function pushChart(g,value){

g.data.labels.push(hora);
g.data.datasets[0].data.push(value);

if(g.data.labels.length>MAX_PUNTOS){
g.data.labels.shift();
g.data.datasets[0].data.shift();
}

}

pushChart(graficoTemp,d.v1);
pushChart(graficoHum,d.v2);
pushChart(graficoPres,d.v3);

graficoGeneral.data.labels.push(hora);

graficoGeneral.data.datasets[0].data.push(d.v1);
graficoGeneral.data.datasets[1].data.push(d.v2);
graficoGeneral.data.datasets[2].data.push(d.v3);

if(graficoGeneral.data.labels.length>MAX_PUNTOS){

graficoGeneral.data.labels.shift();
graficoGeneral.data.datasets.forEach(ds=>ds.data.shift());

}

graficoGeneral.update();
graficoTemp.update();
graficoHum.update();
graficoPres.update();

agregarFilaTabla(d);

}

}

cargarInicial();

setInterval(verificarNuevoDato,3000);

</script>

</body>
</html>
