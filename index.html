<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitoreo Ambiental</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#f4f6fb;
--card:#ffffff;
--text:#222;
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#e5e7eb;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.status{
text-align:center;
color:#22c55e;
margin-bottom:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:14px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
margin-bottom:20px;
position:relative;
overflow:hidden;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

canvas{
width:100% !important;
height:320px !important;
}

/* animacion suave tipo telemetria */

.card::after{

content:"";
position:absolute;
top:0;
left:-100%;
width:200%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.06),
transparent
);

animation:scan 6s linear infinite;

pointer-events:none;

}

@keyframes scan{
0%{transform:translateX(0)}
100%{transform:translateX(50%)}
}

/* tabla */

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid #ddd;
}

.switch{
position:fixed;
top:15px;
right:20px;
background:var(--card);
padding:8px 12px;
border-radius:20px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

</style>
</head>

<body>

<div class="switch" onclick="toggleMode()">🌙 / ☀</div>

<div class="container">

<h1>Monitoreo Ambiental</h1>
<div class="status">Sistema activo</div>

<div class="card">
<canvas id="graficoGeneral"></canvas>
</div>

<div class="grid">

<div class="card">
<canvas id="graficoTemp"></canvas>
</div>

<div class="card">
<canvas id="graficoHum"></canvas>
</div>

<div class="card">
<canvas id="graficoGas"></canvas>
</div>

</div>

<div class="card">

<table id="tablaDatos">

<thead>
<tr>
<th>Fecha</th>
<th>Temperatura</th>
<th>Humedad</th>
<th>Gas</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

const API_URL = "TU_URL_DE_APPS_SCRIPT_AQUI";

let datos = [];

let graficoGeneral;
let graficoTemp;
let graficoHum;
let graficoGas;

async function cargarDatos(){

const r = await fetch(API_URL);
const data = await r.json();

datos = data;

render();

}

async function verificarNuevoDato(){

const r = await fetch(API_URL);
const data = await r.json();

if(data.length > datos.length){

datos = data;

render();

}

}

function render(){

const labels = datos.map(d => d.fecha);
const temp = datos.map(d => d.temperatura);
const hum = datos.map(d => d.humedad);
const gas = datos.map(d => d.gas);

if(!graficoGeneral){

crearGraficos(labels,temp,hum,gas);

}else{

graficoGeneral.data.labels = labels;
graficoTemp.data.labels = labels;
graficoHum.data.labels = labels;
graficoGas.data.labels = labels;

graficoGeneral.data.datasets[0].data = temp;
graficoGeneral.data.datasets[1].data = hum;
graficoGeneral.data.datasets[2].data = gas;

graficoTemp.data.datasets[0].data = temp;
graficoHum.data.datasets[0].data = hum;
graficoGas.data.datasets[0].data = gas;

graficoGeneral.update();
graficoTemp.update();
graficoHum.update();
graficoGas.update();

}

renderTabla();

}

function crearGraficos(labels,temp,hum,gas){

graficoGeneral = new Chart(
document.getElementById('graficoGeneral'),
{
type:'line',
data:{
labels:labels,
datasets:[
{
label:'Temperatura',
data:temp,
borderColor:'#ef4444',
tension:0.4
},
{
label:'Humedad',
data:hum,
borderColor:'#3b82f6',
tension:0.4
},
{
label:'Gas',
data:gas,
borderColor:'#22c55e',
tension:0.4
}
]
},
options:{responsive:true,maintainAspectRatio:false}
}
);

graficoTemp = crearGrafico('graficoTemp','Temperatura',temp,'#ef4444',labels);
graficoHum = crearGrafico('graficoHum','Humedad',hum,'#3b82f6',labels);
graficoGas = crearGrafico('graficoGas','Gas',gas,'#22c55e',labels);

}

function crearGrafico(id,label,data,color,labels){

return new Chart(
document.getElementById(id),
{
type:'line',
data:{
labels:labels,
datasets:[
{
label:label,
data:data,
borderColor:color,
tension:0.4
}
]
},
options:{
responsive:true,
maintainAspectRatio:false
}
}
)

}

function renderTabla(){

const tbody = document.querySelector("#tablaDatos tbody");
tbody.innerHTML="";

datos.slice().reverse().forEach(d=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.fecha}</td>
<td>${d.temperatura}</td>
<td>${d.humedad}</td>
<td>${d.gas}</td>
`;

tbody.appendChild(tr);

})

}

function toggleMode(){
document.body.classList.toggle("dark");
}

cargarDatos();

setInterval(verificarNuevoDato,3000);

</script>

</body>
</html>
